services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pedi_ai_web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || curl -sf http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
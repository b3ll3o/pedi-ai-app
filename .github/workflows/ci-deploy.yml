name: App CI & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Testes unitários
        run: npm test

      - name: Verificar cobertura
        run: npm run test:coverage

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: pedi-ai-app

      - name: Deploy App na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            # Função para executar com retry
            ssh_retry() {
              local max_attempts=3
              local delay=5
              for i in $(seq 1 $max_attempts); do
                if "$@"; then
                  return 0
                fi
                if [ $i -lt $max_attempts ]; then
                  echo "Tentativa $i falhou, retry em ${delay}s..."
                  sleep $delay
                  delay=$((delay * 2))
                fi
              done
              return 1
            }

            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true

            # Instalar Node.js 20 se não existir
            if ! command -v node &> /dev/null || [[ $(node -v) != v20* ]]; then
              # Aguardar lock do apt liberar
              while fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do sleep 1; done
              apt-get update -y
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
              npm install -g npm@latest
            fi

            # Se pasta não existe, clonar. Se existe, fazer pull.
            if [ ! -d /root/pedi-ai-app ]; then
              git clone https://github.com/b3ll3o/pedi-ai-app.git /root/pedi-ai-app
            fi

            cd /root/pedi-ai-app

            # Reset + clean para garantir estado limpo
            git reset --hard origin/main
            git clean -fd

            # Pull latest changes
            git pull origin main

            # Criar .env.local ANTES do build ( Next.js precisa em tempo de build)
            if [ ! -f /root/pedi-ai-app/.env.local ]; then
              echo "NEXT_PUBLIC_API_URL=/api" > /root/pedi-ai-app/.env.local
              echo "NODE_ENV=production" >> /root/pedi-ai-app/.env.local
              echo "PORT=3000" >> /root/pedi-ai-app/.env.local
              echo "HOST=0.0.0.0" >> /root/pedi-ai-app/.env.local
            fi

            # Build com NEXT_PUBLIC_API_URL pointing to nginx proxy
            npm ci
            npm run build

            # Copiar arquivos estáticos para o standalone (Next.js standalone não os inclui automaticamente)
            cp -r .next/static ./standalone/.next/
            cp -r .next/server/app ./standalone/.next/server/ 2>/dev/null || true

            # Copiar serviço systemd
            cp deploy/pedi-ai-app.service /etc/systemd/system/

            # DETECTAR standalone mode e ajustar ExecStart
            if grep -q '"standalone"' /root/pedi-ai-app/next.config.ts 2>/dev/null; then
              echo "Detectado output: standalone - ajustando comando de start..."
              sed -i 's|ExecStart=.*|ExecStart=/usr/bin/node .next/standalone/server.js|' /etc/systemd/system/pedi-ai-app.service
              echo "Usando standalone server (memory efficient)"
            else
              echo "Modo padrão detectado - usando next start"
            fi

            # Parar e desabilitar container Docker (se existir)
            docker compose down 2>/dev/null || true
            systemctl disable pedi-ai-app 2>/dev/null || true
            fuser -k 3000/tcp 2>/dev/null || true
            lsof -ti:3000 | xargs -r kill -9 2>/dev/null || true
            sleep 3

            # Criar .env se não existir (temporário)
            if [ ! -f /root/pedi-ai-app/.env ]; then
              echo "ATENÇÃO: .env não encontrado, criando temporário..."
              echo "NEXT_PUBLIC_API_URL=/api" > /root/pedi-ai-app/.env
              echo "NODE_ENV=production" >> /root/pedi-ai-app/.env
              echo "PORT=3000" >> /root/pedi-ai-app/.env
              echo "HOST=0.0.0.0" >> /root/pedi-ai-app/.env
            fi

            # Sempre garantir que NEXT_PUBLIC_API_URL está correto (substituir se necessário)
            if grep -q "NEXT_PUBLIC_API_URL" /root/pedi-ai-app/.env 2>/dev/null; then
              # Substituir qualquer valor antigo de NEXT_PUBLIC_API_URL
              sed -i 's/NEXT_PUBLIC_API_URL=.*/NEXT_PUBLIC_API_URL=\/api/' /root/pedi-ai-app/.env
            else
              echo "NEXT_PUBLIC_API_URL=/api" >> /root/pedi-ai-app/.env
            fi

            # Recarregar e iniciar serviço systemd
            systemctl daemon-reload
            systemctl enable pedi-ai-app
            systemctl restart pedi-ai-app

            # Ver logs se falhar
            sleep 3
            if ! systemctl is-active --quiet pedi-ai-app; then
              echo "=== Logs do systemd ==="
              journalctl -u pedi-ai-app --no-pager -n 50 || true
              systemctl status pedi-ai-app --no-pager || true
            fi

            # Aguardar App ficar ready
            echo "Aguardando App Next.js..."
            for i in {1..60}; do
              if curl -sf http://localhost:3000 > /dev/null 2>&1; then
                echo "App pronto!"
                break
              fi
              echo "Aguardando App... ($i/60)"
              sleep 2
            done

            # Remover configs conflitantes antes de criar o novo
            sudo rm -f /etc/nginx/sites-enabled/pedi-ai /etc/nginx/sites-available/andreazzi.tech /etc/nginx/sites-enabled/andreazzi.tech 2>/dev/null || true

            # NGINX com SSL (HTTP→HTTPS redirect + HTTPS na porta 443)
            cat << 'NGINX_EOF' | sudo tee /etc/nginx/sites-available/andreazzi.tech > /dev/null
            server {
                listen 80;
                server_name andreazzi.tech;
                return 301 https://$server_name$request_uri;
            }

            server {
                listen 443 ssl http2;
                server_name andreazzi.tech;

                ssl_certificate /etc/letsencrypt/live/andreazzi.tech/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/andreazzi.tech/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

                client_max_body_size 10M;

                location /api/ {
                    proxy_pass http://127.0.0.1:3001/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            NGINX_EOF

            sudo ln -sf /etc/nginx/sites-available/andreazzi.tech /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true

            # Recarregar nginx
            ssh_retry sudo nginx -t && ssh_retry sudo systemctl reload nginx || ssh_retry sudo systemctl restart nginx

            # Verificar se config foi aplicado corretamente
            echo "=== Verificando config do nginx ==="
            ssh_retry "grep -A2 'listen 443' /etc/nginx/sites-available/andreazzi.tech" || echo "ERRO: nginx config incorreto!"
            echo "Nginx configurado para andreazzi.tech com SSL!"

            # Verificar status
            echo "=== Status do App ==="
            systemctl status pedi-ai-app --no-pager

            # Verificar se App está respondendo via HTTPS
            echo "=== Health Check HTTPS ==="
            curl -sf https://localhost:3000 > /dev/null && echo "App responds on HTTPS!" || echo "App not responding on HTTPS"

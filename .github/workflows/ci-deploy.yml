name: App CI & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Testes unitários
        run: npm test

      - name: Verificar cobertura
        run: npm run test:coverage

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: pedi-ai-app

      - name: Deploy App na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true

            # Se pasta não existe, clonar. Se existe, fazer pull.
            if [ ! -d pedi-ai-app ]; then
              git clone https://github.com/b3ll3o/pedi-ai-app.git pedi-ai-app
            fi

            cd pedi-ai-app

            # Pull latest changes
            git pull origin main

            # Parar serviços existentes
            docker compose down || true

            # Garantir que porta 3000 está livre
            fuser -k 3000/tcp 2>/dev/null || true
            sleep 2

            # Build e start
            docker compose up -d --build

            # Aguardar App ficar healthy
            echo "Aguardando App Next.js..."
            for i in {1..60}; do
              if curl -sf http://localhost:3000 > /dev/null 2>&1; then
                echo "App pronto!"
                break
              fi
              echo "Aguardando App... ($i/60)"
              sleep 2
            done

            # Configurar Nginx para andreazzi.tech
            cat > /tmp/andreazzi.tech << 'EOF'
server {
    listen 80;
    server_name andreazzi.tech;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
EOF

            sudo mv /tmp/andreazzi.tech /etc/nginx/sites-available/
            sudo ln -sf /etc/nginx/sites-available/andreazzi.tech /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx
            echo "Nginx configurado para andreazzi.tech!"

            # Verificar logs
            docker compose logs --tail=20 web
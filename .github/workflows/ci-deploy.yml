name: App CI & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Testes unitários
        run: npm test

      - name: Verificar cobertura
        run: npm run test:coverage

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: pedi-ai-app

      - name: Deploy App na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true

            # Se pasta não existe, clonar. Se existe, fazer pull.
            if [ ! -d pedi-ai-app ]; then
              git clone https://github.com/b3ll3o/pedi-ai-app.git pedi-ai-app
            fi

            cd pedi-ai-app

            # Pull latest changes
            git pull origin main

            # Parar serviços existentes
            docker compose down || true

            # Garantir que rede Docker existe e conectar containers
            docker network create pedinet 2>/dev/null || true

            # Conectar container da API se existir (pode não estar rodsando)
            docker network connect pedinet pedi_ai_api 2>/dev/null || true

            # Conectar PostgreSQL se existir
            docker network connect pedinet pedi_ai_postgres 2>/dev/null || true

            # Garantir que porta 3000 está livre
            fuser -k 3000/tcp 2>/dev/null || true
            sleep 2

            # Build e start - API disponível em api:3001 via rede Docker
            # NEXT_PUBLIC_API_URL para comunicação interna Docker
            NEXT_PUBLIC_API_URL=http://api:3001 docker compose up -d --build

            # Aguardar App ficar healthy
            echo "Aguardando App Next.js..."
            for i in {1..60}; do
              if curl -sf http://localhost:3000 > /dev/null 2>&1; then
                echo "App pronto!"
                break
              fi
              echo "Aguardando App... ($i/60)"
              sleep 2
            done

            # Configurar Nginx para andreazzi.tech
            # Limpar qualquer config anterior conflitante
            sudo rm -f /etc/nginx/sites-available/andreazzi.tech /etc/nginx/sites-enabled/andreazzi.tech 2>/dev/null || true

            printf '%s\n' 'server {' '    listen 80;' '    server_name andreazzi.tech;' '' '    location / {' '        proxy_pass http://localhost:3000;' '        proxy_http_version 1.1;' '        proxy_set_header Upgrade $http_upgrade;' '        proxy_set_header Connection '"'"'upgrade'"'"';' '        proxy_set_header Host $host;' '        proxy_set_header X-Real-IP $remote_addr;' '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' '        proxy_set_header X-Forwarded-Proto $scheme;' '        proxy_cache_bypass $http_upgrade;' '    }' '}' | sudo tee /etc/nginx/sites-available/andreazzi.tech > /dev/null

            sudo ln -sf /etc/nginx/sites-available/andreazzi.tech /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true

            # Start nginx se não estiver ativo
            sudo systemctl start nginx || true
            sudo nginx -t && sudo systemctl reload nginx || sudo systemctl restart nginx
            echo "Nginx configurado para andreazzi.tech!"

            # Verificar logs
            docker compose logs --tail=20 web
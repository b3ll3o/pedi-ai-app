name: Setup Nginx

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nginx on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            # Função para executar com retry
            ssh_retry() {
              local max_attempts=3
              local delay=5
              for i in $(seq 1 $max_attempts); do
                if "$@"; then
                  return 0
                fi
                if [ $i -lt $max_attempts ]; then
                  echo "Tentativa $i falhou, retry em ${delay}s..."
                  sleep $delay
                  delay=$((delay * 2))
                fi
              done
              return 1
            }

            # Nginx instalado?
            if ! command -v nginx &> /dev/null; then
              echo "Instalando Nginx..."
              apt update && apt install -y nginx
            fi

            # Proxy reverso para andreazzi.tech (com proxy para API)
            printf '%s\n' \
              'server {' \
              '    listen 80;' \
              '    server_name andreazzi.tech;' \
              '' \
              '    location /api {' \
              '        proxy_pass http://127.0.0.1:3001;' \
              '        proxy_http_version 1.1;' \
              '        proxy_set_header Upgrade $http_upgrade;' \
              '        proxy_set_header Connection '"'"'upgrade'"'"';' \
              '        proxy_set_header Host $host;' \
              '        proxy_set_header X-Real-IP $remote_addr;' \
              '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' \
              '        proxy_set_header X-Forwarded-Proto $scheme;' \
              '        proxy_cache_bypass $http_upgrade;' \
              '    }' \
              '' \
              '    location / {' \
              '        proxy_pass http://127.0.0.1:3000;' \
              '        proxy_http_version 1.1;' \
              '        proxy_set_header Upgrade $http_upgrade;' \
              '        proxy_set_header Connection '"'"'upgrade'"'"';' \
              '        proxy_set_header Host $host;' \
              '        proxy_set_header X-Real-IP $remote_addr;' \
              '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' \
              '        proxy_set_header X-Forwarded-Proto $scheme;' \
              '        proxy_cache_bypass $http_upgrade;' \
              '    }' \
              '}' > /etc/nginx/sites-available/andreazzi.tech

            # Ativar site
            ln -sf /etc/nginx/sites-available/andreazzi.tech /etc/nginx/sites-enabled/

            # Remover default
            rm -f /etc/nginx/sites-enabled/default

            # Testar e recarregar nginx
            ssh_retry nginx -t
            ssh_retry systemctl reload nginx || ssh_retry systemctl restart nginx
            echo "Nginx configurado com sucesso!"

name: Setup Nginx

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nginx on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            # Nginx instalado?
            if ! command -v nginx &> /dev/null; then
              echo "Instalando Nginx..."
              apt update && apt install -y nginx
            fi

            # Proxy reverso para andreazzi.tech
            cat > /etc/nginx/sites-available/andreazzi.tech << 'EOF'
server {
    listen 80;
    server_name andreazzi.tech;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
EOF

            # Proxy para API (opcional, subdominio)
            cat > /etc/nginx/sites-available/api_andreazzi.tech << 'EOF'
server {
    listen 80;
    server_name api.andreaizzi.tech;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
EOF

            # Ativar sites
            ln -sf /etc/nginx/sites-available/andreazzi.tech /etc/nginx/sites-enabled/
            ln -sf /etc/nginx/sites-available/api_andreazzi.tech /etc/nginx/sites-enabled/ 2>/dev/null || true

            # Remover default
            rm -f /etc/nginx/sites-enabled/default

            # Testar e recarregar
            nginx -t && systemctl reload nginx
            echo "Nginx configurado com sucesso!"
